<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analyzing...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>
<div class="blob b4"></div>

<div class="page">
  <div class="landing">

    <div class="loading-wave">
      <svg viewBox="0 0 200 60" width="200" height="60">
        <defs>
          <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#C4895A" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#C4895A" stop-opacity="0.05"/>
          </linearGradient>
        </defs>
        <path id="lf" fill="url(#lg)"/>
        <path id="ll" fill="none" stroke="#C4895A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <h1 class="landing-title" style="font-size: 36px; margin-top: 24px;">
      Hey <em>{{ username }}</em>
    </h1>

    <p class="landing-sub" id="status-text" style="margin-bottom: 0;">
      Fetching your recently played tracks...
    </p>

  </div>
</div>

<script>
const messages = [
  "Fetching your recently played tracks...",
  "Generating your audio features...",
  "Discovering your color identity...",
  "Finding your animal personality...",
  "Drawing your energy curves...",
  "Almost ready..."
];

let i = 0;
const el = document.getElementById("status-text");
setInterval(() => {
  i = (i + 1) % messages.length;
  el.style.opacity = 0;
  setTimeout(() => { el.textContent = messages[i]; el.style.opacity = 1; }, 300);
}, 1800);

let phase = 0;
function animateWave() {
  phase += 0.05;
  const W = 200, H = 60, pad = 8;
  const pts = Array.from({length: 12}, (_, i) => {
    const x = pad + (i / 11) * (W - pad*2);
    const y = H/2 + Math.sin(phase + i * 0.8) * 18 + Math.sin(phase*1.5 + i*0.4) * 8;
    return [x, y];
  });
  let d = `M ${pts[0][0]} ${pts[0][1]}`;
  for (let j = 0; j < pts.length-1; j++) {
    const cx = (pts[j][0] + pts[j+1][0]) / 2;
    d += ` C ${cx} ${pts[j][1]}, ${cx} ${pts[j+1][1]}, ${pts[j+1][0]} ${pts[j+1][1]}`;
  }
  document.getElementById('ll').setAttribute('d', d);
  document.getElementById('lf').setAttribute('d', d + ` L ${pts[pts.length-1][0]} ${H} L ${pts[0][0]} ${H} Z`);
  requestAnimationFrame(animateWave);
}
animateWave();

setTimeout(() => { window.location.href = "/analyze"; }, 3000);
</script>
</body>
</html>
